  <script type="module">
    import { loginWithStudentId } from './js/auth.js';

    const form = document.getElementById("loginForm");
    const msg  = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      const studentId = document.getElementById("studentId").value.trim();
      const password  = document.getElementById("password").value;
      if(!studentId || !password){ msg.textContent = "ID와 비밀번호를 입력하세요."; return; }

      try {
        const { profile } = await loginWithStudentId(studentId, password);
        if(profile && profile.mustChangePassword){
          window.location.href = "change-password.html";   // 최초 로그인
        } else {
          window.location.href = "main.html";              // 이미 비번 바꾼 사람
        }
      } catch(err){
        const code = err.code || "";
        if(["auth/invalid-credential","auth/wrong-password","auth/user-not-found"].includes(code))
          msg.textContent = "ID 또는 비밀번호가 올바르지 않습니다.";
        else if(code === "auth/invalid-email")
          msg.textContent = "ID 형식이 올바르지 않습니다.";
        else
          msg.textContent = "로그인 오류: " + (err.code || err.message);
      }
    });
  </script>
